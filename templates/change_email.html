{% extends "base.html" %}
{% block title %}Change Email{% endblock %}

{% block content %}

<div class="container mt-4" style="max-width: 600px;">

  <!-- HEADER -->
  <div class="mb-4">
    <h3 class="fw-bold mb-1">Change Email</h3>
    <p class="text-secondary mb-0">
      Enter Your New Email Address.
    </p>
  </div>

  <!-- CARD -->
  <div class="glass-card p-4">

    <form method="POST">

      <!-- CODE INPUT -->
      <div class="mb-3">
        <label class="form-label text-secondary small">
          New Email Address
        </label>

        <input type="email"
               name="email"
               class="form-control search-input"
               placeholder="Enter new email address"
               required>

        <small class="text-secondary d-block mt-2">
          Confirm to change email.
        </small>
      </div>

      <!-- ACTIONS -->
      <div class="d-flex gap-2 flex-wrap mt-4">

        <button type="submit"
                class="btn-primary-custom flex-fill">

          Confirm

        </button>

        <a href="{{ url_for('verify_user') }}"
           class="btn-light-custom flex-fill text-center">

          Cancel

        </a>

      </div>

    </form>

  </div>

</div>

{% endblock %}
