{% extends "base.html" %}
{% block title %}Create Event{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-8">

    <div class="card shadow-sm border-0 p-4">
      <h4 class="fw-bold mb-4">Create New Event</h4>

      <form method="POST" action="{{ url_for('create_event') }}" enctype="multipart/form-data">

        <!-- Title -->
        <div class="mb-3">
          <label class="form-label">Event Title</label>
          <input type="text" name="title" class="form-control" placeholder="e.g. Tech Meetup 2026" required>
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" rows="4" class="form-control"
                    placeholder="Describe your event..." required></textarea>
        </div>

        <!-- Address -->
        <div class="mb-3">
          <label class="form-label">Address</label>
          <input type="text" name="address" class="form-control"
                 placeholder="Street, area, landmark">
        </div>

          <div class="mb-3">
            <label class="form-label">State</label>
            <select id="state" name="state" class="form-control" required>
                <option value="">select state</option>
                {% for state in states %}
                <option value="{{ state['state'] }}">{{ state["state"] }}</option>
                {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Local Government</label>
            <select id="lga" name="lga" class="form-control" required>
                <option value="">select LGA</option>
            </select>
          </div>

        <!-- Event Type -->
        <div class="mb-3">
          <label class="form-label">Event Type</label>
          <select name="event_type" class="form-select" required>
            <option value="free">Free</option>
            <option value="paid">Paid</option>
            <option value="private">Private</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Amount</label>
          <input type="number" name="amount" class="form-control" placeholder="e.g. 2000">
          <small class="text-muted">Leave blank if it isn't a paid event!!</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Max attendees</label>
          <input type="number" name="attendee" class="form-control" placeholder="e.g. 50" required>
        </div>

        <div class="mb-3">
        <label for="date" class="form-label">Event Date</label>
        <input type="date" id="date" name="date" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Event Time</label>
          <input type="time" name="time" class="form-control" required>
          <small class="text-muted">This is a 24hour clock</small>
        </div>

        <div class="mb-3">
          <label class="form-label">End Time</label>
          <input type="time" name="endtime" class="form-control" required>
          <small class="text-muted">This is a 24hour clock</small>
        </div>

        <div class="mb-4">
          <label class="form-label">Cover Image</label>
          <input type="file" name="cover" class="form-control" accept="image/*" required>
          <small class="text-muted">This is your seller!!</small>
        </div>

<!--        &lt;!&ndash; Multiple Images &ndash;&gt;-->
<!--        <div class="mb-4">-->
<!--          <label class="form-label">Images</label>-->
<!--          <input type="file" name="images" class="form-control" accept="image/*" multiple>-->
<!--          <small class="text-muted">You can upload multiple images</small>-->
<!--        </div>-->

        <!-- Submit -->
        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-primary px-4">
            Create Event
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
<script>
document.getElementById("state").addEventListener("change", function () {
    const state = this.value;
    const lgaSelect = document.getElementById("lga");

    lgaSelect.innerHTML = "<option>Loading...</option>";

    fetch(`/get-lgas?state=${state}`)
        .then(response => response.json())
        .then(data => {
            lgaSelect.innerHTML = "<option value=''>Select LGA</option>";

            data.forEach(lga => {
                lgaSelect.innerHTML += `<option value="${lga}">${lga}</option>`;
            });
        })
        .catch(() => {
            lgaSelect.innerHTML = "<option>Error loading LGAs</option>";
        });
});
</script>


{% endblock %}
