{% extends "base.html" %}
{% block title %}Delete Action | Watzup{% endblock %}

{% block content %}

<div class="danger-wrap">

  <div class="danger-card">

    <h1>Delete Action</h1>

    <p class="warning-text">
      This action is irreversible. Please confirm your identity to proceed.
    </p>

    <form method="POST">

      <label>Enter Password</label>

      <input type="password"
             name="code"
             placeholder="Enter password to confirm"
             required>

      <div class="actions">

        <button type="submit" class="danger-btn">
          Delete
        </button>

        <a href="{{ url_for('index') }}" class="cancel-btn">
          Cancel
        </a>

      </div>

    </form>

  </div>

</div>

<style>

/* PAGE WRAPPER */
.danger-wrap{
  min-height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background: radial-gradient(circle at top,
              rgba(123,47,247,0.15),
              transparent 60%),
              radial-gradient(circle at bottom,
              rgba(0,198,255,0.10),
              transparent 60%);
}

/* CARD */
.danger-card{
  width:100%;
  max-width:480px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  text-align:center;
}

/* TITLE */
.danger-card h1{
  font-size:28px;
  font-weight:800;
  color:#ff4d4d;
  margin-bottom:10px;
}

/* WARNING TEXT */
.warning-text{
  color:#9ca3af;
  font-size:14px;
  margin-bottom:25px;
}

/* LABEL */
label{
  display:block;
  text-align:left;
  font-size:13px;
  color:#cbd5e1;
  margin-bottom:8px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:#111827;
  color:white;
  margin-bottom:20px;
  outline:none;
}

input:focus{
  border-color:#7B2FF7;
  box-shadow:0 0 0 2px rgba(123,47,247,0.2);
}

/* ACTIONS */
.actions{
  display:flex;
  gap:12px;
  justify-content:space-between;
  flex-wrap:wrap;
}

/* DELETE BUTTON */
.danger-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ff4d4d,#ff1a75);
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.danger-btn:hover{
  transform:scale(1.02);
}

/* CANCEL */
.cancel-btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);
  color:#cbd5e1;
  text-decoration:none;
  text-align:center;
  transition:0.2s;
}

.cancel-btn:hover{
  border-color:#00C6FF;
  color:white;
}

/* MOBILE */
@media(max-width:600px){
  .actions{
    flex-direction:column;
  }
}

</style>

{% endblock %}
