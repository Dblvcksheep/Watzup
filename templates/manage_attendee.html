{% extends "base.html" %}
{% block title %}Verify Attendee Action{% endblock %}

{% block content %}

<div class="verify-wrapper">

  <div class="verify-card glass-card">

    <!-- HEADER -->
    <div class="verify-header">

      <div class="verify-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>

      <h2>Secure Verification</h2>

      <p>
        Confirm your identity to manage event attendees
      </p>

    </div>

    <!-- FORM -->
    <form method="POST">

      <div class="input-group-custom">

        <label>Security Code</label>

        <input type="password"
               name="code"
               placeholder="Enter your password"
               required>

      </div>

      <div class="verify-actions">

        <button type="submit"
                class="btn-primary-custom flex-fill">

          Continue

        </button>

        <a href="{{ url_for('index') }}"
           class="btn-light-custom flex-fill text-center">

          Cancel

        </a>

      </div>

    </form>

  </div>

</div>

<style>

/* =========================
   WRAPPER
========================= */

.verify-wrapper{
  min-height:75vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* =========================
   CARD
========================= */

.verify-card{
  width:100%;
  max-width:460px;
  padding:36px;
}

/* =========================
   HEADER
========================= */

.verify-header{
  text-align:center;
  margin-bottom:30px;
}

.verify-icon{
  width:74px;
  height:74px;
  margin:0 auto 18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  box-shadow:0 0 30px rgba(123,47,247,0.35);
}

.verify-icon i{
  font-size:30px;
  color:white;
}

.verify-header h2{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
  color:white;
}

.verify-header p{
  color:var(--text-soft);
  font-size:15px;
  line-height:1.6;
}

/* =========================
   FORM
========================= */

.input-group-custom{
  display:flex;
  flex-direction:column;
  margin-bottom:22px;
}

.input-group-custom label{
  font-size:14px;
  margin-bottom:8px;
  color:var(--text-soft);
}

.input-group-custom input{
  width:100%;
  padding:15px 18px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:white;
  font-size:15px;
  outline:none;
  transition:0.25s ease;
}

.input-group-custom input::placeholder{
  color:#8b8ba5;
}

.input-group-custom input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(0,198,255,0.12);
}

/* =========================
   ACTIONS
========================= */

.verify-actions{
  display:flex;
  gap:14px;
  margin-top:30px;
}

.verify-actions a{
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

/* =========================
   MOBILE
========================= */

@media(max-width:576px){

  .verify-card{
    padding:24px;
  }

  .verify-header h2{
    font-size:24px;
  }

  .verify-actions{
    flex-direction:column;
  }

}

</style>

{% endblock %}
