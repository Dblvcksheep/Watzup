{% extends 'base.html' %}
{% block title %}All Users{% endblock %}

{% block content %}

<div class="container mt-4">

  <h4 class="mb-3 fw-bold">Users</h4>

  {% if users and users|length > 0 %}

    {% for user in users %}
      <div class="card mb-2 shadow-sm border-0 p-3">

        <div class="d-flex justify-content-between align-items-center">

          <div>
            <a href="{{ url_for('profile', user_id=user.id) }}"
               class="fw-semibold text-decoration-none">
              {{ user.name }}
            </a>

            <div class="text-muted small">
              {{ user.email }}
            </div>
          </div>

          <div class="d-flex gap-2">

            <a href="{{ url_for('edit_profile', user_id=user.id) }}"
               class="btn btn-sm btn-outline-primary">
              Edit
            </a>

            <a href="{{ url_for('delete', table='user', action_id=user.id) }}"
               class="btn btn-sm btn-outline-danger"
               onclick="return confirm('Are you sure you want to delete this event?')">
              Delete
            </a>

          </div>

        </div>

      </div>
    {% endfor %}

  {% else %}

    <div class="alert alert-info">
      No users yet.
    </div>

  {% endif %}

</div>

{% endblock %}
