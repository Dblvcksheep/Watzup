{% extends "base.html" %}
{% block title %}Withdraw{% endblock %}

{% block content %}

<div class="container mt-4" style="max-width: 600px;">

  <!-- HEADER -->
  <div class="mb-4">
    <h3 class="fw-bold mb-1">Withdraw Funds</h3>
    <p class="text-secondary mb-0">
      Make sure your details match your bank account name.
    </p>
  </div>

  <!-- FORM CARD -->
  <div class="glass-card p-4">

    <form method="POST">

      <!-- FULL NAME -->
      <div class="mb-3">
        <label class="form-label text-secondary small">Full Name</label>
        <input type="text"
               name="name"
               class="form-control search-input"
               placeholder="John Doe"
               required>
      </div>

      <!-- ACCOUNT NUMBER -->
      <div class="mb-3">
        <label class="form-label text-secondary small">Account Number</label>
        <input type="text"
               name="acct_number"
               class="form-control search-input"
               placeholder="0123456789"
               required>
      </div>

      <!-- BANK -->
      <div class="mb-3">
        <label class="form-label text-secondary small">Select Bank</label>
        <select name="bank"
                class="form-select search-input"
                required>

          <option value="">Select bank</option>
          <option value="opay">Opay</option>
          <option value="kuda">Kuda</option>
          <option value="palmpay">Palmpay</option>
          <option value="moniepoint">Moniepoint</option>

        </select>
      </div>

      <!-- AMOUNT -->
      <div class="mb-2">
        <label class="form-label text-secondary small">Amount</label>
        <input type="number"
               name="amount"
               class="form-control search-input"
               placeholder="Enter amount"
               min="1"
               required>
      </div>

      <div class="text-secondary small mb-4">
        Ensure you have ₦50 charges. Balance: ₦{{ current_user.wallet }}
      </div>

      <!-- ACTIONS -->
      <div class="d-flex gap-2 flex-wrap">

        <button type="submit"
                class="btn-primary-custom flex-fill">

          Withdraw

        </button>

        <a href="{{ url_for('index') }}"
           class="btn-light-custom flex-fill text-center">

          Cancel

        </a>

      </div>

    </form>

  </div>

</div>

{% endblock %}
